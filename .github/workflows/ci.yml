name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check python/ tests/

      - name: Type check (mypy)
        run: uv run mypy python/

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short -m "not e2e"

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Cargo tests
        run: cargo test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Start API (background)
        run: |
          uv run uvicorn python.api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: E2E smoke tests
        run: uv run pytest tests/e2e/ -v --tb=short -k "not skip"

  model-validation:
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Validate feature lifting accuracy
        run: uv run python scripts/validate_lifting.py --threshold 0.85
